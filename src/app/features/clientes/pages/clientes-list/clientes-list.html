<div class="container">
    <div class="row mb-4" style="margin-top: 15px;">
        <div class="col-lg-12 d-flex justify-content-between align-items-center">
            <h2 class="fw-bold">
                <p class="text-muted mb-0">Listado general de clientes registrados</p>
            </h2>
            <button class="btn btn-primary" routerLink="/clientes/nuevo">Nuevo CLiente</button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-reponsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Codigo</th>
                            <th>Nombre</th>
                            <th>Dui</th>
                            <th>Telefono</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let cliente of clientes">
                            <td>{{cliente.codigo}}</td>
                            <td>{{cliente.nombre}}</td>
                            <td>{{cliente.dui}}</td>
                            <td>{{cliente.telefono}}</td>
                            <td><span class="badge"
                                [ngClass]="cliente.estado === 'Activo' ? 'text-bg-success' : 'text-bg-danger'">{{cliente.estado}}</span></td>
                            <td>
                                <button class="btn btn-warning btn-sm"
                                [routerLink]="['/clientes/editar', cliente.codigo]">
                                    Editar
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
